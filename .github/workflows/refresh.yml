name: Refresh predictions

# Runs twice a week to pull the latest results for all leagues, retrain the
# models, and push updated data to the website repo (which Vercel auto-deploys).
# Can also be triggered manually with optional league filtering.
on:
  schedule:
    - cron: "0 7 * * 1,5" # Monday & Friday, 07:00 UTC
  workflow_dispatch:
    inputs:
      leagues:
        description: "Space-separated league IDs to refresh (blank = all: pl laliga bundesliga seriea ligue1)"
        required: false
        default: ""
      bootstrap:
        description: "Download full history instead of just current season"
        type: boolean
        default: false

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out model repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh match data
        run: |
          ARGS="${{ github.event.inputs.leagues }}"
          if [ "${{ github.event.inputs.bootstrap }}" = "true" ]; then
            python -m src.refresh_data --bootstrap $ARGS
          else
            python -m src.refresh_data $ARGS
          fi

      - name: Train models
        run: |
          ARGS="${{ github.event.inputs.leagues }}"
          python -m src.train $ARGS

      - name: Commit data + models to this repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw models
          git diff --cached --quiet || git commit -m "weekly data refresh"
          git push

      - name: Check out website repo
        uses: actions/checkout@v4
        with:
          repository: brysonhen/football_predictor_web
          token: ${{ secrets.WEB_REPO_TOKEN }}
          path: web

      - name: Export models into website
        run: |
          ARGS="${{ github.event.inputs.leagues }}"
          python -m src.export_web web $ARGS

      - name: Commit + push website
        run: |
          cd web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data api/_data
          git diff --cached --quiet || git commit -m "refresh model data"
          git push
